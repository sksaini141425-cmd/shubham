services:
  - type: web
    name: profitbot-three
    env: docker
    plan: free
    region: oregon 
    healthCheckPath: /
    envVars:
      - fromGroup: bot-secrets
      - key: BOT_PROFILE
        value: "three_dollar"
      - key: INITIAL_CAPITAL
        value: "3.00"
      - key: TOP_N_SYMBOLS
        value: "30"
      - key: SYMBOLS_OFFSET
        value: "0"

  - type: web
    name: profitbot-ten
    env: docker
    plan: free
    region: oregon
    healthCheckPath: /
    envVars:
      - fromGroup: bot-secrets
      - key: BOT_PROFILE
        value: "ten_dollar"
      - key: INITIAL_CAPITAL
        value: "10.00"
      - key: TOP_N_SYMBOLS
        value: "30"
      - key: SYMBOLS_OFFSET
        value: "30"
