app = "profitbot-ultra"
primary_region = "sin"  # Singapore - closest to Asia

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "5000"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
